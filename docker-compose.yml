services:
  basic-testing-service:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mysqldb
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/student_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    volumes:
      - .:/app
      - ~/.m2:/root/.m2

  course-service:
    build: ../course-service
    ports:
      - "8081:8081"
    depends_on:
      - mysqldb-course
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb-course:3306/course_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    volumes:
      - ../course-service:/app
      - ~/.m2:/root/.m2

  mysqldb:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_db
    volumes:
      - mysql-data:/var/lib/mysql

  mysqldb-course:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_db
    volumes:
      - mysql-course-data:/var/lib/mysql

volumes:
  mysql-data:
  mysql-course-data:
